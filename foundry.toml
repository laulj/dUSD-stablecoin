[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = ["@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/", "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]


[invariant]
runs = 128           # Number of test runs
depth = 128          # Calls per run
fail_on_revert = true  # Don't fail on handler reverts

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
